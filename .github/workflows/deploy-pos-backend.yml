name: Deploy POS Backend (Lambda container + CFN)

on:
  push:
    branches: [ main ]
    paths:
      - 'pos-backend/**'
      - 'infrastructure/infrastructure-pos-backend.yml'
      - '.github/workflows/deploy-pos-backend.yml'
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  ROLE_ARN: arn:aws:iam::334643191233:role/GitHubActions-DishPatch

  ECR_REPO: dishpatch-pos-backend
  CFN_STACK: DishPatch-Pos-Backend
  CFN_TEMPLATE: infrastructure/infrastructure-pos-backend.yml

  # ---- API config ----
  STAGE_NAME: prod

  # Comma-separated list for CommaDelimitedList parameter
  # Update this to your NEW frontend domain(s)
  CORS_ALLOW_ORIGINS: "https://pos.dish-patch.com"

  # Optional: SSM parameter name (without leading slash)
  JWT_SECRET_SSM_PARAM_NAME: "RestaurantPOS/JWT_SECRET"

  # ---- Optional custom domain settings (leave empty to skip) ----
  API_DOMAIN: "posapi.dish-patch.com"
  ACM_CERT_ARN: "arn:aws:acm:ap-southeast-2:334643191233:certificate/8d9c3a49-fcd4-46d6-82ff-9f590f62e7a1"          # e.g. arn:aws:acm:ap-southeast-2:...:certificate/xxxx
  HOSTED_ZONE_ID: "Z07539553FFDS683L3M15"        # e.g. Z0XXXXXXXXXXXXX

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: dishpatch-pos-backend-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          set -e
          aws ecr describe-repositories --repository-names "${ECR_REPO}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${ECR_REPO}" >/dev/null

      - name: Build & push Lambda container
        uses: docker/build-push-action@v6
        with:
          context: ./pos-backend
          file: ./pos-backend/Dockerfile
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
          provenance: false

      - name: Resolve immutable image digest
        id: digest
        shell: bash
        run: |
          set -euo pipefail
          DIGEST=$(aws ecr describe-images \
            --repository-name "${ECR_REPO}" \
            --image-ids imageTag=${{ github.sha }} \
            --query 'imageDetails[0].imageDigest' --output text)

          if [[ -z "${DIGEST}" || "${DIGEST}" == "None" ]]; then
            echo "Could not resolve image digest for tag ${{ github.sha }}"
            exit 1
          fi

          echo "image_uri=${{ steps.ecr.outputs.registry }}/${ECR_REPO}@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Deploy/Update CloudFormation stack
        shell: bash
        run: |
          set -euo pipefail

          PARAMS=(
            "BackendImageUri=${{ steps.digest.outputs.image_uri }}"
            "StageName=${STAGE_NAME}"
            "CorsAllowOrigins=${CORS_ALLOW_ORIGINS}"
            "JwtSecretSsmParamName=${JWT_SECRET_SSM_PARAM_NAME}"
          )

          # Optional custom domain (only pass when set)
          if [[ -n "${API_DOMAIN}" && -n "${ACM_CERT_ARN}" ]]; then
            PARAMS+=(
              "ApiDomain=${API_DOMAIN}"
              "ACMCertificateArn=${ACM_CERT_ARN}"
            )
            if [[ -n "${HOSTED_ZONE_ID}" ]]; then
              PARAMS+=("HostedZoneId=${HOSTED_ZONE_ID}")
            fi
          fi

          aws cloudformation deploy \
            --stack-name "${CFN_STACK}" \
            --template-file "${CFN_TEMPLATE}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides "${PARAMS[@]}"

      - name: Output API URL
        shell: bash
        run: |
          set -euo pipefail
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${CFN_STACK}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiBaseUrl'].OutputValue" \
            --output text)

          echo "✅ Deployed successfully: ${API_URL}"