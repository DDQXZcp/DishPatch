AWSTemplateFormatVersion: "2010-09-09"
Description: Infrastructure for Restaurant POS Backend - DynamoDB + SQS + Lambda + API Gateway + Custom Domain (portable)

# ===========================
# Parameters
# ===========================
Parameters:
  BackendImageUri:
    Type: String
    Description: ECR image URI for Restaurant POS Backend (Lambda container image)

  # ===== Optional custom domain for the backend API =====
  ApiDomain:
    Type: String
    Default: ""
    Description: Custom domain name for the API (e.g., posapi.example.com). Leave empty to skip custom domain.

  ACMCertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN in the SAME region as the API (REGIONAL endpoint). Required if ApiDomain is set.

  HostedZoneId:
    Type: String
    Default: ""
    Description: (Optional) Route53 hosted zone ID that contains ApiDomain. Required to create a DNS record.

  # ===== API stage =====
  StageName:
    Type: String
    Default: "prod"
    AllowedPattern: "^[a-zA-Z0-9_-]+$"
    Description: API Gateway stage name (e.g., prod, dev, staging)

  # ===== CORS configuration =====
  CorsAllowOrigins:
    Type: CommaDelimitedList
    Default: ""
    Description: >
      Comma-separated list of allowed CORS origins (e.g., https://pos.example.com,https://admin.example.com).
      Leave empty to omit CORS config (not recommended for browser clients).

  # ===== Optional SSM parameter path (JWT secret) =====
  JwtSecretSsmParamName:
    Type: String
    Default: "RestaurantPOS/JWT_SECRET"
    Description: SSM Parameter name (without leading slash) that stores the JWT secret.

# ===========================
# Conditions
# ===========================
Conditions:
  UseCustomDomain: !And
    - !Not [ !Equals [ !Ref ApiDomain, "" ] ]
    - !Not [ !Equals [ !Ref ACMCertificateArn, "" ] ]

  CreateDnsRecord: !And
    - !Not [ !Equals [ !Ref HostedZoneId, "" ] ]
    - !Condition UseCustomDomain

  UseCors: !Not [ !Equals [ !Join [ "", !Ref CorsAllowOrigins ], "" ] ]

# ===========================
# Resources
# ===========================
Resources:
  # ---------------- DynamoDB ----------------
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-Users"
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST

  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-Orders"
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  PaymentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-Payments"
      AttributeDefinitions:
        - AttributeName: paymentId
          AttributeType: S
        - AttributeName: orderId
          AttributeType: S
        - AttributeName: transactionType
          AttributeType: S
      KeySchema:
        - AttributeName: paymentId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: OrderIndex
          KeySchema:
            - AttributeName: orderId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: TransactionTypeIndex
          KeySchema:
            - AttributeName: transactionType
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST

  TablesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-Tables"
      AttributeDefinitions:
        - AttributeName: tableNo
          AttributeType: S
      KeySchema:
        - AttributeName: tableNo
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  MenuItemsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-MenuItems"
      AttributeDefinitions:
        - AttributeName: menuName
          AttributeType: S
      KeySchema:
        - AttributeName: menuName
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  # ---------------- SQS ----------------
  PaymentQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-pos-payment-queue"
      VisibilityTimeout: 30
      MessageRetentionPeriod: 86400
      ReceiveMessageWaitTimeSeconds: 10

  # NOTE: Prefer restricting who can send messages. This keeps original behavior (open send),
  # but you should tighten it once you know the sender identity (e.g., Lambda role, specific AWS account, etc.)
  PaymentQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref PaymentQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowSendMessage
            Effect: Allow
            Principal: "*"
            Action:
              - "sqs:SendMessage"
              - "sqs:GetQueueUrl"
              - "sqs:GetQueueAttributes"
            Resource: !GetAtt PaymentQueue.Arn

  # ---------------- IAM Role for Lambda ----------------
  PosBackendLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      # Avoid fixed RoleName to prevent conflicts across stacks/environments
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${AWS::StackName}-PosBackendLambdaPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

              # SSM Parameter Store (JWT secret)
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${JwtSecretSsmParamName}"

              # DynamoDB (tables + GSIs)
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt UsersTable.Arn
                  - !Sub "${UsersTable.Arn}/index/*"
                  - !GetAtt OrdersTable.Arn
                  - !Sub "${OrdersTable.Arn}/index/*"
                  - !GetAtt PaymentsTable.Arn
                  - !Sub "${PaymentsTable.Arn}/index/*"
                  - !GetAtt TablesTable.Arn
                  - !Sub "${TablesTable.Arn}/index/*"
                  - !GetAtt MenuItemsTable.Arn
                  - !Sub "${MenuItemsTable.Arn}/index/*"

              # SQS Access
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:GetQueueUrl
                  - sqs:GetQueueAttributes
                Resource: !GetAtt PaymentQueue.Arn

  # ---------------- Lambda Function ----------------
  BackendLambda:
    Type: AWS::Lambda::Function
    Properties:
      # Avoid fixed FunctionName to prevent conflicts across stacks/environments
      PackageType: Image
      Role: !GetAtt PosBackendLambdaRole.Arn
      MemorySize: 512
      Timeout: 30
      Environment:
        Variables:
          NODE_ENV: lambda
          REGION: !Ref AWS::Region
          STAGE: !Ref StageName

          # Resource identifiers for your code (prefer reading from env, not hardcoding in code)
          PAYMENT_QUEUE_URL: !Ref PaymentQueue
          USERS_TABLE: !Ref UsersTable
          ORDERS_TABLE: !Ref OrdersTable
          PAYMENTS_TABLE: !Ref PaymentsTable
          TABLES_TABLE: !Ref TablesTable
          MENU_ITEMS_TABLE: !Ref MenuItemsTable

          # Optional: if your code fetches JWT secret from SSM, it can use this name
          JWT_SECRET_PARAM: !Ref JwtSecretSsmParamName
      Code:
        ImageUri: !Ref BackendImageUri

  # ---------------- ApiGateway (HTTP API) ----------------
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-HttpApi"
      ProtocolType: HTTP
      CorsConfiguration: !If
        - UseCors
        - AllowOrigins: !Ref CorsAllowOrigins
          AllowMethods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          AllowHeaders:
            - "Content-Type"
            - "Authorization"
            - "X-Amz-Date"
            - "X-Api-Key"
            - "X-Amz-Security-Token"
          AllowCredentials: true
        - !Ref AWS::NoValue

  Integration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${BackendLambda.Arn}/invocations"
      PayloadFormatVersion: "2.0"

  RouteRoot:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "ANY /"
      Target: !Sub "integrations/${Integration}"

  RouteAnyProxy:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "ANY /{proxy+}"
      Target: !Sub "integrations/${Integration}"

  Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: !Ref StageName
      AutoDeploy: true

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BackendLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/*"

  # ---------------- API Gateway Custom Domain + Route53 ----------------
  ApiCustomDomain:
    Condition: UseCustomDomain
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !Ref ApiDomain
      DomainNameConfigurations:
        - CertificateArn: !Ref ACMCertificateArn
          EndpointType: REGIONAL

  ApiMapping:
    Condition: UseCustomDomain
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref HttpApi
      DomainName: !Ref ApiCustomDomain
      Stage: !Ref Stage

  ApiAliasRecord:
    Condition: CreateDnsRecord
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref ApiDomain
      Type: A
      AliasTarget:
        HostedZoneId: !GetAtt ApiCustomDomain.RegionalHostedZoneId
        DNSName: !GetAtt ApiCustomDomain.RegionalDomainName

# ===========================
# Outputs
# ===========================
Outputs:
  UsersTableName:
    Value: !Ref UsersTable
  OrdersTableName:
    Value: !Ref OrdersTable
  PaymentsTableName:
    Value: !Ref PaymentsTable
  TablesTableName:
    Value: !Ref TablesTable
  MenuItemsTableName:
    Value: !Ref MenuItemsTable

  PaymentQueueUrl:
    Description: The URL of the SQS queue used for payments
    Value: !Ref PaymentQueue

  PaymentQueueArn:
    Description: The ARN of the SQS queue
    Value: !GetAtt PaymentQueue.Arn

  ApiBaseUrl:
    Description: Base URL of the POS Backend API
    Value: !If
      - UseCustomDomain
      - !Sub "https://${ApiDomain}"
      - !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/"